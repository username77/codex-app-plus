name: Release Installer

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: '手动指定 release tag，例如 v0.2.0'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve release metadata
        id: meta
        shell: pwsh
        env:
          INPUT_TAG_NAME: ${{ github.event.inputs.tag_name }}
        run: |
          $package = Get-Content package.json -Raw | ConvertFrom-Json
          $tauriConfig = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $cargoToml = Get-Content src-tauri/Cargo.toml -Raw
          $cargoVersionMatch = [regex]::Match($cargoToml, '(?m)^version\s*=\s*"([^"]+)"')

          if (-not $cargoVersionMatch.Success) {
            throw "未能从 src-tauri/Cargo.toml 解析版本号。"
          }

          $versions = @(
            @{ Name = "package.json"; Value = [string]$package.version },
            @{ Name = "src-tauri/tauri.conf.json"; Value = [string]$tauriConfig.version },
            @{ Name = "src-tauri/Cargo.toml"; Value = [string]$cargoVersionMatch.Groups[1].Value }
          )
          $distinctVersions = $versions.Value | Sort-Object -Unique

          if ($distinctVersions.Count -ne 1) {
            $details = $versions | ForEach-Object { "$($_.Name)=$($_.Value)" }
            throw "版本号不一致：$($details -join ', ')"
          }

          $manualTag = if ($null -eq $env:INPUT_TAG_NAME) { "" } else { $env:INPUT_TAG_NAME.Trim() }
          if ([string]::IsNullOrWhiteSpace($manualTag)) {
            throw "必须提供 tag_name。"
          }

          $tag = $manualTag
          $version = if ($tag.StartsWith("v")) { $tag.Substring(1) } else { $tag }

          if (-not [regex]::IsMatch($version, '^\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?(?:\+[0-9A-Za-z.-]+)?$')) {
            throw "tag 必须包含合法语义化版本，例如 v0.2.0 或 0.2.0；当前输入：$tag"
          }

          git check-ref-format "refs/tags/$tag"
          if ($LASTEXITCODE -ne 0) {
            throw "非法 tag 名称：$tag"
          }

          git fetch --force --tags origin
          if ($LASTEXITCODE -ne 0) {
            throw "拉取远端 tag 失败。"
          }

          git show-ref --verify --quiet "refs/tags/$tag"
          $tagExistsExitCode = $LASTEXITCODE
          $global:LASTEXITCODE = 0

          if ($tagExistsExitCode -eq 0) {
            $tagCommit = (git rev-list -n 1 $tag).Trim()
            if ([string]::IsNullOrWhiteSpace($tagCommit)) {
              throw "无法解析现有 tag 指向的 commit：$tag"
            }

            if ($tagCommit -ne $env:GITHUB_SHA) {
              throw "tag 已存在且指向其他 commit：$tag -> $tagCommit"
            }
          }
          elseif ($tagExistsExitCode -ne 1) {
            throw "检查 tag 是否存在失败：$tag"
          }

          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Apply release version from tag
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          $version = $env:RELEASE_VERSION
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "缺少发布版本号输出。"
          }

          $package = Get-Content package.json -Raw | ConvertFrom-Json
          $package.version = $version
          $package | ConvertTo-Json -Depth 100 | Set-Content package.json -Encoding utf8

          $tauriConfig = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $tauriConfig.version = $version
          $tauriConfig | ConvertTo-Json -Depth 100 | Set-Content src-tauri/tauri.conf.json -Encoding utf8

          $cargoToml = Get-Content src-tauri/Cargo.toml -Raw
          $updatedCargoToml = [regex]::Replace(
            $cargoToml,
            '(?m)^version\s*=\s*"[^"]+"',
            "version = ""$version""",
            1
          )

          if ($updatedCargoToml -eq $cargoToml) {
            throw "未能更新 src-tauri/Cargo.toml 中的版本号。"
          }

          Set-Content src-tauri/Cargo.toml -Value $updatedCargoToml -Encoding utf8

      - name: Show effective release version
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          Write-Host "Release tag: ${{ steps.meta.outputs.tag }}"
          Write-Host "Effective version: $env:RELEASE_VERSION"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build installer
        env:
          CI: true
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm run build:tauri

      - name: Verify updater output
        shell: pwsh
        run: |
          $bundleRoot = "src-tauri/target/release/bundle"
          $installers = Get-ChildItem $bundleRoot -Recurse -File -Filter "*.exe"
          $signatures = Get-ChildItem $bundleRoot -Recurse -File -Filter "*.sig"

          if ($installers.Count -eq 0) {
            throw "未找到 NSIS 安装包输出。"
          }

          if ($signatures.Count -eq 0) {
            throw "未找到 updater 签名文件 .sig。"
          }

      - name: Generate release notes
        shell: pwsh
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
          RELEASE_SHA: ${{ github.sha }}
          RELEASE_NOTES_OUTPUT: release-notes.md
        run: node ./scripts/generate-release-notes.mjs

      - name: Generate updater manifest and collect assets
        shell: pwsh
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
          RELEASE_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          $bundleRoot = "src-tauri/target/release/bundle"
          $assetDir = "release-assets"
          Remove-Item $assetDir -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $assetDir | Out-Null

          $installer = Get-ChildItem $bundleRoot -Recurse -File -Filter "*.exe" | Select-Object -First 1
          if ($null -eq $installer) {
            throw "未找到安装包，无法生成 updater 清单。"
          }

          $signatureFile = Get-ChildItem $bundleRoot -Recurse -File | Where-Object {
            $_.Name -eq "$($installer.Name).sig"
          } | Select-Object -First 1

          if ($null -eq $signatureFile) {
            throw "未找到与安装包匹配的签名文件：$($installer.Name).sig"
          }

          $signature = (Get-Content $signatureFile.FullName -Raw).Trim()
          $notes = (Get-Content release-notes.md -Raw).Trim()
          $encodedInstallerName = [System.Uri]::EscapeDataString($installer.Name)
          $releaseUrl = "https://github.com/$env:GITHUB_REPOSITORY/releases/download/$env:RELEASE_TAG/$encodedInstallerName"
          $manifest = [ordered]@{
            version = $env:RELEASE_VERSION
            notes = $notes
            pub_date = [DateTimeOffset]::UtcNow.ToString("o")
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $signature
                url = $releaseUrl
              }
            }
          }

          $manifest | ConvertTo-Json -Depth 10 | Set-Content (Join-Path $assetDir "latest.json") -Encoding utf8
          Copy-Item $installer.FullName (Join-Path $assetDir $installer.Name)
          Copy-Item $signatureFile.FullName (Join-Path $assetDir $signatureFile.Name)

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: Codex App Plus ${{ steps.meta.outputs.tag }}
          body_path: release-notes.md
          files: |
            release-assets/*
          fail_on_unmatched_files: true
